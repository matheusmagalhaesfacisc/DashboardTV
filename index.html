<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Corporativo - BI Display</title>
<style>
body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: #0f172a; 
    font-family: sans-serif;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: none; 
    position: absolute;
    top: 0;
    left: 0;
}

iframe.active {
    display: block; 
}

/* --- AJUSTE ESPECÍFICO PARA O DASH 4 (Google Apps Script) --- */
#dash1 {
    /* 
       Aumentamos a largura/altura para 125% e escalamos para 0.8 (80%).
       Isso faz com que o conteúdo "diminua" sem cortar as bordas. 
       A conta é: 1 / 0.8 = 1.25. 
    */
    width: 125% !important; 
    height: 125% !important;
    transform: scale(0.8); 
    transform-origin: 0 0; /* Garante que o redimensionamento comece do canto superior esquerdo */
}
</style>
</head>
<body>
<iframe id="dash1" src="https://script.google.com/macros/s/AKfycbwBcwf_60uKKnTnHn051Yn_cO996J5poiV_iopgu-_yMgU-KBLQlteBsr592UUNtMTLKw/exec"></iframe>
<iframe id="dash2" src="https://matheusmagalhaesfacisc.github.io/resumomonitoriaTV/" class="active"></iframe>
<iframe id="dash3" src="https://app.powerbi.com/view?r=eyJrIjoiMjRhZmM4OTktZGE2Mi00MjliLTllZWQtY2MxMTNiMjA4NmZiIiwidCI6ImRmNGM1YmY1LWE0ZjUtNGJlOS04NDA3LTZlNjc5MDA4NjRlNyJ9"></iframe>
<iframe id="dash4" src="https://docs.google.com/presentation/d/e/2PACX-1vRNRwBO-Q88uWN9vQtGZP9bIGJjf_8CDcBfyDIK84ambtAJy9PJAywiNG0SfZjE0kVAoj-JoOmv11jp/pubembed?start=true&loop=true&delayms=5000"></iframe>

<script>
const dashboards = document.querySelectorAll('iframe');
let currentIndex = 0;

const tempoRotacao = 60000; 
const tempoForcarRecarregamento = 900000; 

setInterval(() => {
    dashboards[currentIndex].classList.remove('active');
    currentIndex = (currentIndex + 1) % dashboards.length;
    
    // Refresh preventivo para manter o dado "fresh"
    dashboards[currentIndex].src = dashboards[currentIndex].src;
    dashboards[currentIndex].classList.add('active');

    console.log(`Log: Rotacionado para o dashboard ${currentIndex + 1}`);
}, tempoRotacao);

setTimeout(() => {
    console.warn("Log: Realizando refresh sistêmico para atualização de versão.");
    window.location.reload(true);
}, tempoForcarRecarregamento);
</script>
</body>
</html>
