<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Corporativo - BI Display</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f172a; /* Dark mode para poupar o hardware */
            font-family: sans-serif;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none; /* Esconde todos por padrão */
            position: absolute;
            top: 0;
            left: 0;
        }
        iframe.active {
            display: block; /* Só mostra o que tiver a classe active */
        }
    </style>
</head>
<body>

    <!-- 1. DASHBOARDS E APRESENTAÇÕES -->
    <!-- Dica: Você pode adicionar quantos iframes quiser aqui -->
    <iframe id="dash1" src="https://matheusmagalhaesfacisc.github.io/monitoria-facisc/" class="active"></iframe>
    <iframe id="dash2" src="https://app.powerbi.com/view?r=eyJrIjoiMjRhZmM4OTktZGE2Mi00MjliLTllZWQtY2MxMTNiMjA4NmZiIiwidCI6ImRmNGM1YmY1LWE0ZjUtNGJlOS04NDA3LTZlNjc5MDA4NjRlNyJ9"></iframe>
    <iframe id="dash3" src="https://docs.google.com/presentation/d/e/2PACX-1vStKHwxpl_mnF_lLJ_IDgwhmam32HfMPf-am-syFsq-riZFvCUSkiWmOowhSpX2DgI/pub?start=true&loop=true&delayms=5000"></iframe>

    <script>
        // Selecionamos todos os iframes de uma vez para ganhar performance
        const dashboards = document.querySelectorAll('iframe');
        let currentIndex = 0;

        // ================= CONFIGURAÇÕES DE TEMPO =================
        const tempoRotacao = 60000; // 60 segundos entre as telas
        const tempoForcarRecarregamento = 900000; // 15 minutos para refresh total
        // ==========================================================

        // Lógica de Rotação Dinâmica (Pensa fora da caixa: funciona para N dashboards)
        setInterval(() => {
            // 1. Remove o estado ativo do dashboard atual
            dashboards[currentIndex].classList.remove('active');

            // 2. Calcula o próximo índice (se chegar no fim, volta para o zero)
            currentIndex = (currentIndex + 1) % dashboards.length;

            // 3. Atualiza o SRC do próximo dashboard ANTES de mostrar (Background Refresh)
            // Isso garante que quando ele aparecer, o dado já esteja "fresco"
            dashboards[currentIndex].src = dashboards[currentIndex].src;

            // 4. Adiciona a classe active para mostrar o novo dashboard
            dashboards[currentIndex].classList.add('active');
            
            console.log(`Log: Rotacionado para o dashboard ${currentIndex + 1}`);
        }, tempoRotacao);

        // Lógica de Auto-Reload (Hard Refresh) para evitar memory leak e atualizar o código do GitHub
        setTimeout(() => {
            console.warn("Log: Realizando refresh sistêmico para atualização de versão.");
            window.location.reload(true);
        }, tempoForcarRecarregamento);
    </script>
</body>
</html>
